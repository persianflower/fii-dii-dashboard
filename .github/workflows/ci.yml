name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python pin 3.11

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt nsepython yfinance httpx pytest

      - name: Test
        run: uv run pytest tests/ -v --tb=short -Wignore::FutureWarning

      - name: Run Ruff
        run: ruff check --output-format=github
